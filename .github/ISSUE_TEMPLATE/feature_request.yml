name: Feature request
about: Propose a new user-facing capability or product behavior
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for product-level features.
        Anchor requests to PRD goals/non-goals and measurable outcomes.

  - type: input
    id: problem
    attributes:
      label: Problem Statement
      description: What user problem are we solving?
      placeholder: Users cannot compare providers side-by-side in a single view
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired feature and behavior
      placeholder: Add split-view compare mode with synchronized prompt send
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: In Scope / Out of Scope
      placeholder: |
        In scope: Compare current message across two providers
        Out of scope: Historical retroactive compare for all messages

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define testable completion criteria
      placeholder: |
        - User can choose two providers/models
        - One send action returns two rendered outputs
        - Compare mode works on desktop and degrades cleanly on mobile
    validations:
      required: true

  - type: input
    id: prd_ref
    attributes:
      label: PRD Reference
      description: Relevant PRD section(s)
      placeholder: "4.1 Goals, 7.4 Provider Routing, 15 Success Metrics"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
