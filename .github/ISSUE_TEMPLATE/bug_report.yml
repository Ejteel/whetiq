name: Bug report
about: Report a defect, regression, or reliability issue
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for reproducible defects.
        Link related PRD requirements when relevant.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the problem
      placeholder: Assistant message renders raw markdown in thread view
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: User Impact
      description: Who is affected and how severe is the impact?
      placeholder: Affects all users; core response readability is degraded
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Exact steps to reproduce
      placeholder: |
        1. Open app
        2. Send prompt with markdown response
        3. Observe raw markdown text in assistant bubble
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: Markdown should render as formatted headings/lists/code
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: Markdown is displayed as plain literal characters
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: App target + OS + browser/version (if applicable)
      placeholder: web on macOS 15 + Safari 18.6

  - type: input
    id: prd_ref
    attributes:
      label: PRD Reference
      description: Relevant PRD section(s)
      placeholder: "7.2 Message Rendering, 9 UX/UI Requirements"

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
