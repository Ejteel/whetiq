name: E2E Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/admin/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - ".github/workflows/e2e-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      WEB_BASE_URL: http://127.0.0.1:3001
      ADMIN_BASE_URL: http://127.0.0.1:3010
      PRIVATE_AUTH_MODE: oauth
      AUTH_SECRET: smoke_test_secret
      NEXTAUTH_SECRET: smoke_test_secret
      NEXTAUTH_URL: http://127.0.0.1:3001
      ADMIN_AUTH_SECRET: smoke_test_secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright package
        run: npm install --no-save @playwright/test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start web and admin apps
        run: |
          npm run -w @mvp/web dev > web-dev.log 2>&1 &
          npm run -w @mvp/admin dev > admin-dev.log 2>&1 &

      - name: Wait for apps
        run: npx wait-on http://127.0.0.1:3001 http://127.0.0.1:3010

      - name: Run smoke tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload app logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-logs
          path: |
            web-dev.log
            admin-dev.log
